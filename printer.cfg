# ============================================================
# Klipper Config — Ender 3 + SKR Mini E3 V3.0
# ============================================================
# Basiert auf der bestehenden Config (SKR Mini E3 V2 → V3.0 Upgrade)
# Hardware:
#   - Board:     BIGTREETECH SKR Mini E3 V3.0 (STM32G0B1)  ← NEU
#   - Extruder:  Creality Sprite Pro Direct Drive
#   - Probe:     BLTouch
#   - Sensoren:  Filament Switch + Motion Sensor
#   - Host:      Raspberry Pi (192.168.130.123) mit Fluidd/Mainsail
# ============================================================
# ⚠️  WICHTIGE ÄNDERUNGEN V2 → V3.0:
#   1. Chip: STM32F103 → STM32G0B1 (neue Firmware kompilieren!)
#   2. [static_digital_output usb_pullup_enable] ENTFERNT (nicht mehr nötig)
#   3. board_pins aliases aktualisiert
#   4. enable_pin extruder: !PD2 → !PD1
#   5. heater_bed sensor_pin: PC3 → PC4  (prüfen!)
#   6. Serial-ID nach Flash neu auslesen!
# ============================================================

[include fluidd.cfg]
[include mainsail.cfg]
[include timelapse.cfg]
#[include macros.cfg]
[include fw_retract.cfg]
#[include Adaptive_Meshing.cfg]
#[include Line_Purge.cfg]

# ────────────────────────────────────────────────────────────
# MCU
# ⚠️  Serial nach Flash neu auslesen: ls /dev/serial/by-id/
# ────────────────────────────────────────────────────────────
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_XXXXXXXXXXXXXXXXXXXX-if00
# Alt (V2): usb-Klipper_stm32f103xe_38FFD6054254303236672357-if00

[virtual_sdcard]
path: /home/pi/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[exclude_object]

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100
square_corner_velocity: 5

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

# ────────────────────────────────────────────────────────────
# Stepper X — unverändert
# ────────────────────────────────────────────────────────────
[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC0
position_endstop: 0
position_max: 219
position_min: 0
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.580
stealthchop_threshold: 999999

# ────────────────────────────────────────────────────────────
# Stepper Y — deine angepassten Werte (position_min: -11)
# ────────────────────────────────────────────────────────────
[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: -11
position_min: -11
position_max: 235
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.580
stealthchop_threshold: 999999

# ────────────────────────────────────────────────────────────
# Stepper Z — BLTouch als Z-Endstop
# ────────────────────────────────────────────────────────────
[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 250
position_min: -3

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.580
stealthchop_threshold: 999999

# ────────────────────────────────────────────────────────────
# Extruder — Sprite Pro (kalibrierte Werte aus deiner Config)
# ⚠️  enable_pin V3.0: !PD1 (V2 war !PD2)
# ────────────────────────────────────────────────────────────
[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD1
microsteps: 16
rotation_distance: 7.477        # Dein kalibrierter Wert!
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
control: pid
pid_Kp: 21.527
pid_Ki: 1.063
pid_Kd: 108.982
min_temp: 0
max_temp: 300
max_extrude_only_distance: 500
min_extrude_temp: 170
max_extrude_cross_section: 5

[verify_heater extruder]
max_error: 120
check_gain_time: 20
hysteresis: 5
heating_gain: 2

#====================================================================
# PRESSURE ADVANCE — deine kalibrierten Werte
#====================================================================
#pressure_advance: .0465 # Overture PLA White
pressure_advance: .0225 # Polymaker PLA Pro Teal
pressure_advance_smooth_time: 0.04

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.650
stealthchop_threshold: 999999

# ────────────────────────────────────────────────────────────
# Heizbett
# ⚠️  sensor_pin: V3.0 nutzt PC4 (prüfen ob identisch mit deiner V2)
# ────────────────────────────────────────────────────────────
[heater_bed]
heater_pin: PC9
sensor_type: ATC Semitec 104GT-2
sensor_pin: PC4
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130

# ────────────────────────────────────────────────────────────
# BLTouch — deine kalibrierten Offsets
# ────────────────────────────────────────────────────────────
[bltouch]
probe_with_touch_mode: True
sensor_pin: ^PC14
control_pin: PA1
pin_up_touch_mode_reports_triggered: False
x_offset: -30
y_offset: -42
pin_move_time: 0.4
speed: 35
samples: 3
sample_retract_dist: 5.0

[safe_z_home]
home_xy_position: 110, 110
speed: 50
z_hop: 10
z_hop_speed: 5

# ────────────────────────────────────────────────────────────
# Bed Mesh — deine Einstellungen
# ────────────────────────────────────────────────────────────
[bed_mesh]
speed: 150.0
horizontal_move_z: 7.0
mesh_min: 5, 15
mesh_max: 185, 172
probe_count: 5,5
algorithm: bicubic
mesh_pps: 2, 2
bicubic_tension: 0.2
fade_start: 1.0
fade_end: 10.0

# ────────────────────────────────────────────────────────────
# Filament Sensoren — unverändert
# ────────────────────────────────────────────────────────────
[filament_switch_sensor switch_sensor]
switch_pin: ^PC15
pause_on_runout: False
runout_gcode:
  PAUSE
  M117 Filament ist alle
insert_gcode:
  M117 Filament wieder eingelegt

[filament_motion_sensor encoder_sensor]
switch_pin: ^PC12
detection_length: 10
extruder: extruder
pause_on_runout: False
runout_gcode:
  PAUSE
  M117 Filament ist verstopft
insert_gcode:
  M117 Filament wieder erkannt

# ────────────────────────────────────────────────────────────
# Lüfter
# ────────────────────────────────────────────────────────────
[heater_fan heatbreak_cooling_fan]
pin: PC7

[fan]
pin: PC6

# ────────────────────────────────────────────────────────────
# Display — TFT35 E3 V3.0 (Marlin-Emulationsmodus)
# ⚠️  board_pins für V3.0 aktualisiert
# ────────────────────────────────────────────────────────────
[board_pins]
aliases:
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8,  EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PB15, EXP1_10=<5V>

[display]
lcd_type: emulated_st7920
en_pin: EXP1_7
spi_software_sclk_pin: EXP1_6
spi_software_mosi_pin: EXP1_8
spi_software_miso_pin: PA3
encoder_pins: ^EXP1_5, ^EXP1_3
click_pin: ^!EXP1_2

[output_pin beeper]
pin: EXP1_1

# ────────────────────────────────────────────────────────────
# Bed Screws (manuelle Nivellierhilfe)
# ────────────────────────────────────────────────────────────
[bed_screws]
screw1: 27, 41
screw2: 192, 41
screw3: 192, 216
screw4: 27, 216

# ────────────────────────────────────────────────────────────
# Klipper Macros + Spoolman
# ────────────────────────────────────────────────────────────
[gcode_macro _km_options]
variable_start_purge_length: 30
gcode:

[include klipper-macros/velocity.cfg]
[include klipper-macros/status_events.cfg]
[include klipper-macros/state.cfg]
[include klipper-macros/start_end.cfg]
[include klipper-macros/pause_resume_cancel.cfg]
[include klipper-macros/park.cfg]
[include klipper-macros/layers.cfg]
[include klipper-macros/kinematics.cfg]
[include klipper-macros/idle.cfg]
[include klipper-macros/globals.cfg]
[include klipper-macros/status_events.cfg]
[include filament.cfg]
[include klipper-macros/fans.cfg]
[include klipper-macros/draw.cfg]
[include klipper-macros/beep.cfg]
[include klipper-macros/bed_surface.cfg]
[include klipper-macros/bed_mesh_fast.cfg]

[idle_timeout]
gcode:
  _KM_IDLE_TIMEOUT

[pause_resume]
recover_velocity: 25

[respond]

[save_variables]
filename: ~/printer_data/variables.cfg

[gcode_macro SET_ACTIVE_SPOOL]
gcode:
  {% if params.ID %}
    {% set id = params.ID|int %}
    {action_call_remote_method("spoolman_set_active_spool", spool_id=id)}
  {% else %}
    {action_respond_info("Parameter 'ID' is required")}
  {% endif %}

[gcode_macro CLEAR_ACTIVE_SPOOL]
gcode:
  {action_call_remote_method("spoolman_set_active_spool", spool_id=None)}

[gcode_macro SET_ACTIVE_FILAMENT]
description: Set loaded filament's Spoolman ID
gcode:
  {% if params.ID %}
    {% set id = params.ID|int %}
    SAVE_VARIABLE VARIABLE=active_filament VALUE={id}
  {% else %}
    {action_respond_info("Parameter 'ID' is required")}
  {% endif %}

[gcode_macro ASSERT_ACTIVE_FILAMENT]
description: PAUSE print if wrong filament's Spoolman ID != ID
gcode:
  {% if params.ID %}
    {% set id = params.ID|int %}
    {% set current_id = printer.save_variables.variables["active_filament"]|int %}
    {% if id != current_id %}
      M600
    {% endif %}
  {% else %}
    {action_respond_info("Parameter 'ID' is required")}
  {% endif %}

[gcode_shell_command qrcode_qrscanner]
command: sh /home/pi/printer_data/config/qrcodespoolman.sh
verbose: True
timeout: 2.

[gcode_macro QRCode_Scan]
gcode:
    RUN_SHELL_COMMAND CMD=qrcode_qrscanner

[gcode_shell_command inject_ssh]
command: bash /home/pi/printer_data/config/inject_ssh.sh
timeout: 10
verbose: True

[display_status]

